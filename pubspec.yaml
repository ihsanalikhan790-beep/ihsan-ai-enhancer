name: ihsan_ai_enhancer
description: A complete professional AI photo enhancer app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  google_sign_in: ^6.1.6

  # State Management
  provider: ^6.1.1

  # UI & Animations
  lottie: ^2.7.0
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.0
  before_after: ^3.2.0
  google_fonts: ^6.1.0
  flutter_spinkit: ^5.2.0
  shimmer: ^3.0.0

  # Utilities
  image_picker: ^1.0.4
  shared_preferences: ^2.2.2
  http: ^1.1.0
  path_provider: ^2.1.1
  permission_handler: ^11.1.0
  image_gallery_saver: ^2.0.3
  intl: ^0.19.0
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
